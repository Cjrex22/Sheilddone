server:
  port: ${PORT:8080}
firebase:
  service-account-key: ${FIREBASE_SERVICE_ACCOUNT_KEY:classpath:serviceAccountKey.json}
  project-id: ${FIREBASE_PROJECT_ID:your-project-id}
  storage-bucket: ${FIREBASE_STORAGE_BUCKET:your-project-id.appspot.com}
cors:
  allowed-origins: http://localhost:5173,${FRONTEND_URL:https://your-app-url.web.app}
spring:
  application:
    name: sheild-backend
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0
  mvc:
    static-path-pattern: /**
